name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  contracts-and-install-lifecycle:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # 3.9 is the published lower bound, not merely a syntax check.
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile all supported Python sources
        run: PYTHONPATH=src python -m compileall -q src skills scripts tests
      - name: Validate canonical contracts
        run: PYTHONPATH=src python scripts/validate_contracts.py
      - name: Detect generated adapter drift
        run: PYTHONPATH=src python scripts/generate_adapters.py --check
      - name: Detect generated compatibility-documentation drift
        run: PYTHONPATH=src python scripts/render_compatibility.py --check
      - name: Exercise receipt-owned install update uninstall round trips
        run: PYTHONPATH=src python -m unittest tests.integration.test_installer -v
      - name: Run full unit integration and contract discovery
        run: PYTHONPATH=src python -m unittest discover -s tests -v
      - name: Reject whitespace errors
        run: git diff --check
